      /* Page loading overlay */
      .page-loading-overlay {
        position: fixed;
        top: 0;

        width: 100%;
        height: 100%;
        background: #fff;
        z-index: 99999;
        display: flex;
        justify-content: center;
        align-items: center;
        transition:
          opacity 0.5s ease,
          visibility 0.5s ease;
      }

      .page-loading-overlay.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      /* Loading spinner */
      .loading-spinner {
        width: 50px;
        height: 50px;
        border: 4px solid #f3f3f3;
        border-top: 4px solid #3498db;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      /* Page content - initially hidden */
      .app-wrap {
        opacity: 0;
        transition: opacity 0.5s ease;
      }

      .app-wrap.visible {
        opacity: 1;
      }

                    <h5>اضافة عذر</h5>
                    <h6 class="sub-heading">Submit New Excuse</h6>
                  </div>
                </div>
              </div>
            </div>
          </header>
          <div class="main-content">
            <div>
              <input type="hidden" />
              <div class="row gutters">
                <div class="col-lg-6 col-xs-12 col-md-12 col-sm-12">
                  <div class="card">
                    <div class="col-lg-12 col-md-12 col-xs-12 col-sm-12">
                      <div class="card-body">
                        <div class="form-group">
                          <label>نوع العذر <required style="color: red">*</required></label>
                          <select id="excuse_type_id" class="form-control" required="yes" name="excuse_type_id">
                            <option value="" selected="selected">اختار النوع</option>
                            <option value="1">فترة من الدراسة</option>
                            <option value="2">امتحان أعمال السنة</option>
                            <option value="3">الامتحان العملي</option>
                            <option value="4">امتحان نهاية الفصل الدراسي</option>
                            <option value="5">فصل دراسي</option>
                          </select>
                        </div>

                        <div class="form-group d-none" id="terms_dev">
                          <label>فصل <required style="color: red">*</required></label>
                          <select name="term_id" id="term_id" class="form-control" disabled="">
                            <option value="">أختار الترم</option>
                            <option value="187">الربيع 2026</option>
                            <option value="176">الخريف 2025</option>
                            <option value="178">الصيف 2025</option>
                            <option value="171">ربيع 2025</option>
                            <option value="161">خريف 2024</option>
                            <option value="162">صيف 2024</option>
                            <option value="156">ربيع 2024</option>
                            <option value="151">خريف 2023</option>
                            <option value="152">صيف 2023</option>
                            <option value="150">ربيع 2023</option>
                          </select>
                        </div>

                        <div class="form-group d-none" id="years_dev">
                          <label>السنة <required style="color: red">*</required></label>
                          <select name="term_id" id="year" class="form-control" disabled="">
                            <option value="">اختر السنة</option>
                            <option value="176">2025/2026</option>
                          </select>
                        </div>

                        <div class="form-group d-none" id="courses_dev">
                          <label
                            >المواد
                            <required style="color: red">* <small style="font-style: italic">Please press Ctrl to select more than one course.</small> </required>
                          </label>
                          <select name="courses_ids[]" id="courses_ids" class="form-control" multiple="" disabled=""></select>
                        </div>

                        <div class="form-group d-none" id="from_dev">
                          <label>من <required style="color: red">*</required></label>
                          <input type="date" class="form-control" id="from" name="period_from" value="" disabled="" />
                        </div>

                        <div class="form-group d-none" id="to_dev">
                          <label>إلي <required style="color: red">*</required></label>
                          <input type="date" class="form-control" id="to" name="period_to" value="" disabled="" />
                        </div>

                        <div class="form-group">
                          <label>Excuse Reasons <required style="color: red">*</required></label>
                          <textarea required="" name="reasons" id="reasons" class="form-control" placeholder="Excuse Reasons" cols="30" rows="5" title="Excuse Reasons"></textarea>
                        </div>
                        <div class="form-group">
                          <input required="" type="file" onchange="validateFileName(this)" class="filestyle" name="attachments[]" data-icon="true" multiple="" />
                        </div>
                      </div>
                    </div>
