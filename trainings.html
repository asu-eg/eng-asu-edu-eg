      .page-loading-overlay {

        background: #fff;
        z-index: 99999;
        display: flex;
        justify-content: center;

        transition:

      }

      .page-loading-overlay.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .loading-spinner {
        width: 50px;

        border: 4px solid #f3f3f3;

        }
        100% {

      }

        transition: opacity 0.5s ease;
      }

      .app-wrap.visible {
