    <script>
      document.addEventListener('DOMContentLoaded', function () {
        // Get all tab links
        const suggestionsTab = document.getElementById('suggetions-tab');
        const complainsTab = document.getElementById('complains-tab');

        // Get all tab panes
        const suggestionsPane = document.getElementById('suggetions');
        const complainsPane = document.getElementById('complains');

        // Get the hidden type input
        const typeInput = document.getElementById('type');

        // Function to switch tabs
        function switchTab(activeTab, activePane, inactiveTab, inactivePane, typeValue) {
          // Update tab links
          activeTab.classList.add('active');
          inactiveTab.classList.remove('active');

          // Update aria attributes for tabs
          activeTab.setAttribute('aria-selected', 'true');
          activeTab.setAttribute('aria-expanded', 'true');
          inactiveTab.setAttribute('aria-selected', 'false');
          inactiveTab.setAttribute('aria-expanded', 'false');

          // Update tab panes
          activePane.classList.add('active', 'show');
          inactivePane.classList.remove('active', 'show');

          // Update aria attributes for panes
          activePane.setAttribute('aria-expanded', 'true');
          inactivePane.setAttribute('aria-expanded', 'false');

          // Update hidden type input
          typeInput.value = typeValue;
        }

        // Add click event listeners
        suggestionsTab.addEventListener('click', function (e) {
          e.preventDefault();
          switchTab(suggestionsTab, suggestionsPane, complainsTab, complainsPane, 'suggestions');
        });

        complainsTab.addEventListener('click', function (e) {
          e.preventDefault();
          switchTab(complainsTab, complainsPane, suggestionsTab, suggestionsPane, 'complains');
        });
      });
    </script>
