    <style>
      /* Page loading overlay */
      .page-loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #fff;
        z-index: 99999;
        display: flex;
        justify-content: center;
        align-items: center;
        transition:
          opacity 0.5s ease,
          visibility 0.5s ease;
      }

      .page-loading-overlay.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      /* Loading spinner */
      .loading-spinner {
        width: 50px;
        height: 50px;
        border: 4px solid #f3f3f3;
        border-top: 4px solid #3498db;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      /* Page content - initially hidden */
      .app-wrap {
        opacity: 0;
        transition: opacity 0.5s ease;
      }

      .app-wrap.visible {
        opacity: 1;
      }
    </style>

          <header class="main-heading">

                  </div>
                  <div class="page-title">
                    <h5>Submit Excuse</h5>
                    <h6 class="sub-heading">Submit New Excuse</h6>
                  </div>
                </div>
              </div>
            </div>
          </header>
          <div class="main-content">
            <div>
              <input type="hidden" />
              <div class="row gutters">
                <div class="col-lg-6 col-xs-12 col-md-12 col-sm-12">
                  <div class="card">
                    <div class="col-lg-12 col-md-12 col-xs-12 col-sm-12">
                      <div class="card-body">
                        <div class="form-group">
                          <label>Excuse Type <required style="color: red">*</required></label>
                          <select id="excuse_type_id" class="form-control" required="yes" name="excuse_type_id">
                            <option value="" selected="selected">Select Type</option>
                            <option value="1">Study Period</option>
                            <option value="2">Mid Term Exam</option>
                            <option value="3">Lab Exam</option>
                            <option value="4">Final Exam</option>
                            <option value="5">One Semester</option>
                          </select>
                        </div>

                        <div class="form-group d-none" id="terms_dev">
                          <label>Term <required style="color: red">*</required></label>
                          <select name="term_id" id="term_id" class="form-control" disabled="">
                            <option value="">Select Term</option>
                            <option value="187">Spring 2026</option>
                            <option value="176">Fall 2025</option>
                            <option value="178">Summer 2025</option>
                            <option value="171">Spring 2025</option>
                            <option value="161">Fall 2024</option>
                            <option value="162">Summer 2024</option>
                            <option value="156">Spring 2024</option>
                            <option value="151">Fall 2023</option>
                            <option value="152">Summer 2023</option>
                            <option value="150">Spring 2023</option>
                          </select>
                        </div>

                        <div class="form-group d-none" id="years_dev">
                          <label>Year <required style="color: red">*</required></label>
                          <select name="term_id" id="year" class="form-control" disabled="">
                            <option value="">Select Year</option>
                            <option value="176">2025/2026</option>
                          </select>
                        </div>

                        <div class="form-group d-none" id="courses_dev">
                          <label
                            >Courses
                            <required style="color: red">* <small style="font-style: italic">Please press Ctrl to select more than one course.</small> </required>
                          </label>
                          <select name="courses_ids[]" id="courses_ids" class="form-control" multiple="" disabled=""></select>
                        </div>

                        <div class="form-group d-none" id="from_dev">
                          <label>From <required style="color: red">*</required></label>
                          <input type="date" class="form-control" id="from" name="period_from" value="" disabled="" />
                        </div>

                        <div class="form-group d-none" id="to_dev">
                          <label>To <required style="color: red">*</required></label>
                          <input type="date" class="form-control" id="to" name="period_to" value="" disabled="" />
                        </div>

                        <div class="form-group">
                          <label>Excuse Reasons <required style="color: red">*</required></label>
                          <textarea required="" name="reasons" id="reasons" class="form-control" placeholder="Excuse Reasons" cols="30" rows="5" title="Excuse Reasons"></textarea>
                        </div>
                        <div class="form-group">
                          <input required="" type="file" onchange="validateFileName(this)" class="filestyle" name="attachments[]" data-icon="true" multiple="" />
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
